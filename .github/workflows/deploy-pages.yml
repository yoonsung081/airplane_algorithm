# GitHub Pages 정적 배포
# Settings → Pages → Source: GitHub Actions
#
# deploy-pages는 "이 run 안에서 artifact_name과 일치하는 아티팩트가 정확히 1개"여야 합니다.
# upload/deploy를 job으로 나누고, 기본값 "github-pages"가 아닌 고유 이름을 써서
# Re-run 시 쌓인 github-pages 아티팩트와 충돌하지 않게 합니다.

name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: airplane-algorithm-site-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: airplane-algorithm-site-${{ github.run_id }}-${{ github.run_attempt }}
