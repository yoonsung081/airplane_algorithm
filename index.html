<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache">
    <title>3D 항공 네트워크 시뮬레이터</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Noto Sans KR', sans-serif; }
        #globe-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        .ui-container { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.75); padding: 20px; border-radius: 10px; width: 450px; backdrop-filter: blur(10px); }
        .form-select, .btn { margin-top: 10px; }
        #results-panel { margin-top: 20px; }
        .path-result { padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .astar-path { background: rgba(40, 167, 69, 0.2); border-left: 5px solid #28a745; }
        .dijkstra-path { background: rgba(13, 202, 240, 0.2); border-left: 5px solid #0dcaf0; }
        .direct-path { background: rgba(255, 193, 7, 0.2); border-left: 5px solid #ffc107; }
        .explain-panel { background: rgba(255,255,255,0.06); border-radius: 8px; padding: 12px; border: 1px solid rgba(255,255,255,0.12); font-size: 0.85rem; line-height: 1.5; }
        .explain-panel h6 { font-size: 0.9rem; margin-bottom: 0.5rem; color: #e7e7e7; }
        .explain-panel ul { margin: 0; padding-left: 1.1rem; }
    </style>
</head>
<body>
    <div id="globe-container"></div>

    <div class="ui-container">
        <h1 class="h4 text-center mb-4">✈️ 3D 항공 시뮬레이터</h1>
        
        <ul class="nav nav-pills nav-fill mb-3">
            <li class="nav-item"><a href="#" class="nav-link active" id="mode-search">경로 탐색</a></li>
            <li class="nav-item"><a href="#" class="nav-link" id="mode-sim">실시간 시뮬레이션</a></li>
        </ul>

        <div id="search-panel">
            <div class="row g-2 mb-3">
                <div class="col-md">
                    <label for="continent-filter" class="form-label">대륙</label>
                    <input type="text" id="continent-search" class="form-control mb-1" placeholder="대륙 검색...">
                    <select id="continent-filter" class="form-select"></select>
                </div>
                <div class="col-md">
                    <label for="country-filter" class="form-label">국가</label>
                    <input type="text" id="country-search" class="form-control mb-1" placeholder="국가 검색...">
                    <select id="country-filter" class="form-select"></select>
                </div>
            </div>
            <div class="mb-3">
                <label for="origin" class="form-label">출발지</label>
                <input type="text" id="origin-search" class="form-control mb-1" placeholder="출발지 검색...">
                <select id="origin" class="form-select"></select>
            </div>
            <div class="mb-3">
                <label for="destination" class="form-label">도착지</label>
                <input type="text" id="destination-search" class="form-control mb-1" placeholder="도착지 검색...">
                <select id="destination" class="form-select"></select>
            </div>
            <div class="mb-3">
                <label for="algorithm-select" class="form-label">알고리즘</label>
                <select id="algorithm-select" class="form-select">
                    <option value="both">A* + 다익스트라 비교</option>
                    <option value="astar">A* 만</option>
                    <option value="dijkstra">다익스트라 만</option>
                </select>
            </div>
            <button id="calculate" class="btn btn-primary w-100">경로 계산</button>
            <button id="show-example" class="btn btn-secondary w-100 mt-2">예시 보기</button>
        </div>

        <div id="sim-controls" style="display: none;">
            <div class="mb-3">
                <label for="airplane-count" class="form-label">비행기 수: <span id="airplane-count-label">15</span></label>
                <input type="range" class="form-range" min="1" max="100" value="15" id="airplane-count">
            </div>
            <div class="mb-3">
                <label for="sim-speed" class="form-label">시뮬레이션 속도: <span id="sim-speed-label">1.0</span>x</label>
                <input type="range" class="form-range" min="0.1" max="5" value="1" step="0.1" id="sim-speed">
            </div>
            <button id="toggle-sim" class="btn btn-success w-100">시뮬레이션 시작</button>
        </div>

        <div id="results-panel"></div>
        <div id="explain-panel" class="explain-panel mt-3" style="display: none;" aria-live="polite"></div>
        <div id="sim-insight-panel" class="explain-panel mt-3" style="display: none;" aria-live="polite"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="./static/js/main.js?v=4"></script>
</body>
</html>
